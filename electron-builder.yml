appId: com.kasir.desktop
productName: Kasir
copyright: Copyright © 2026

asar: false

directories:
  output: dist
  buildResources: build

files:
  - "standalone/**"
  - "prisma/schema.prisma"
  - "electron-dist/**"
  - "package.json"
  - "!.env*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true

publish:
  provider: generic
  url: "https://kasir.irfanjauhari.com/updates/"
